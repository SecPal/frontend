---
name: Quality Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  reuse:
    name: Check REUSE Compliance
    uses: SecPal/.github/.github/workflows/reusable-reuse.yml@main

  license-compatibility:
    name: Check License Compatibility
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install REUSE
        run: pip install --disable-pip-version-check reuse

      - name: Check AGPL license compatibility
        run: |
          echo "Checking for AGPL-3.0-or-later compatibility..."
          reuse spdx -o reuse.spdx

          license_expressions=$(grep "^LicenseInfoInFile:" reuse.spdx | cut -d':' -f2- | sort -u)
          echo "Found license expressions:"
          printf '%s\n' "$license_expressions"

          compatible_licenses=(
            "AGPL-3.0-or-later"
            "GPL-3.0-or-later"
            "LGPL-3.0-or-later"
            "MIT"
            "BSD-2-Clause"
            "BSD-3-Clause"
            "Apache-2.0"
            "CC0-1.0"
            "ISC"
            "OFL-1.1"
            "ODbL-1.0"
            "LicenseRef-SecPal-Attribution"
            "LicenseRef-TailwindPlus"
          )

          incompatible_found=0
          while IFS= read -r license_expression; do
            [ -z "$license_expression" ] && continue

            normalized_expression=${license_expression//\(/( }
            normalized_expression=${normalized_expression//\)/ )}

            for license in $normalized_expression; do
              case "$license" in
                AND|OR|WITH|"("|")")
                  continue
                  ;;
              esac

              found=0
              for compatible in "${compatible_licenses[@]}"; do
                if [[ "$license" == "$compatible" ]]; then
                  found=1
                  break
                fi
              done

              if [ $found -eq 0 ]; then
                echo "ERROR: Incompatible license found: $license"
                incompatible_found=1
              fi
            done
          done <<< "$license_expressions"

          if [ $incompatible_found -eq 1 ]; then
            echo "ERROR: Found licenses incompatible with AGPL-3.0-or-later"
            exit 1
          fi

          echo "All licenses are compatible with AGPL-3.0-or-later ✓"

  prettier:
    name: Formatting Check
    uses: SecPal/.github/.github/workflows/reusable-prettier.yml@main

  markdown-lint:
    name: Markdown Lint
    uses: SecPal/.github/.github/workflows/reusable-markdown-lint.yml@main

  ai-instructions:
    name: AI Instructions
    uses: SecPal/.github/.github/workflows/reusable-ai-instructions.yml@main

  eslint:
    name: ESLint
    uses: SecPal/.github/.github/workflows/reusable-node-lint.yml@main
    with:
      node-version: "22"

  typecheck:
    name: TypeScript Check
    uses: SecPal/.github/.github/workflows/reusable-node-build.yml@main
    with:
      node-version: "22"
      build-command: "npm run typecheck"

  vitest:
    name: Vitest Tests
    runs-on: ubuntu-latest
    # Mass Dependabot rebases can launch many full-suite coverage jobs at once;
    # serializing Vitest avoids runner/cache thrash and worker-pool stalls that
    # previously cancelled jobs at the 15-minute ceiling (frontend#1233).
    concurrency:
      group: vitest-${{ github.repository }}
      cancel-in-progress: false
      queue: max
    timeout-minutes: 25
    if: ${{ !startsWith(github.head_ref, 'spike/') && !startsWith(github.ref, 'refs/heads/spike/') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        # --foreground-scripts serializes lifecycle scripts to dodge the
        # esbuild postinstall ETXTBSY race on hosted Linux runners; the
        # short retry loop covers any residual transient failures.
        # ETXTBSY surfaces in seconds, so retries are cheap and a
        # per-attempt timeout would only risk killing legitimate
        # cold-cache installs without bounding actual failure modes.
        # The job's 25-minute timeout-minutes is the overall safety net.
        run: |
          set -uo pipefail
          attempts=3
          for i in $(seq 1 "$attempts"); do
            if npm ci --foreground-scripts; then
              exit 0
            fi
            if [ "$i" -lt "$attempts" ]; then
              echo "::warning::npm ci failed (attempt ${i}/${attempts}); retrying in 5s"
              sleep 5
            fi
          done
          echo "::error::npm ci failed after ${attempts} attempts"
          exit 1

      - name: Run tests
        if: ${{ github.event_name == 'pull_request' }}
        run: npm run test:ci

      - name: Run tests with coverage
        if: ${{ github.event_name != 'pull_request' }}
        run: npm run test:coverage:ci

      - name: Upload coverage to Codecov
        if: ${{ github.event_name != 'pull_request' }}
        # v5
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
        with:
          token: ${{ secrets.CODECOV_TOKEN || '' }}
          files: ./coverage/lcov.info,./coverage/clover.xml
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: true
