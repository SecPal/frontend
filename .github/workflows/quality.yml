---
name: Quality Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  reuse:
    name: Check REUSE Compliance
    uses: SecPal/.github/.github/workflows/reusable-reuse.yml@main

  license-compatibility:
    name: Check License Compatibility
    uses: SecPal/.github/.github/workflows/reusable-license-compatibility.yml@main

  prettier:
    name: Formatting Check
    uses: SecPal/.github/.github/workflows/reusable-prettier.yml@main

  markdown-lint:
    name: Markdown Lint
    uses: SecPal/.github/.github/workflows/reusable-markdown-lint.yml@main

  copilot-instructions:
    name: Copilot Instructions
    uses: SecPal/.github/.github/workflows/reusable-copilot-instructions.yml@main

  eslint:
    name: ESLint
    uses: SecPal/.github/.github/workflows/reusable-node-lint.yml@main
    with:
      node-version: "22"

  typecheck:
    name: TypeScript Check
    uses: SecPal/.github/.github/workflows/reusable-node-build.yml@main
    with:
      node-version: "22"
      build-command: "npm run typecheck"

  vitest:
    name: Vitest Tests
    runs-on: ubuntu-latest
    # Mass Dependabot rebases can launch many full-suite coverage jobs at once;
    # serializing Vitest avoids runner/cache thrash and worker-pool stalls that
    # previously cancelled jobs at the 15-minute ceiling (frontend#1233).
    concurrency:
      group: vitest-${{ github.repository }}
      cancel-in-progress: false
      queue: max
    timeout-minutes: 25
    if: ${{ !startsWith(github.head_ref, 'spike/') && !startsWith(github.ref, 'refs/heads/spike/') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        # --foreground-scripts serializes lifecycle scripts to dodge the
        # esbuild postinstall ETXTBSY race on hosted Linux runners; the
        # short retry loop covers any residual transient failures.
        # ETXTBSY surfaces in seconds, so retries are cheap and a
        # per-attempt timeout would only risk killing legitimate
        # cold-cache installs without bounding actual failure modes.
        # The job's 25-minute timeout-minutes is the overall safety net.
        run: |
          set -uo pipefail
          attempts=3
          for i in $(seq 1 "$attempts"); do
            if npm ci --foreground-scripts; then
              exit 0
            fi
            if [ "$i" -lt "$attempts" ]; then
              echo "::warning::npm ci failed (attempt ${i}/${attempts}); retrying in 5s"
              sleep 5
            fi
          done
          echo "::error::npm ci failed after ${attempts} attempts"
          exit 1

      - name: Run tests
        if: ${{ github.event_name == 'pull_request' }}
        run: npm run test:ci

      - name: Run tests with coverage
        if: ${{ github.event_name != 'pull_request' }}
        run: npm run test:coverage:ci

      - name: Upload coverage to Codecov
        if: ${{ github.event_name != 'pull_request' }}
        # v5
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
        with:
          token: ${{ secrets.CODECOV_TOKEN || '' }}
          files: ./coverage/lcov.info,./coverage/clover.xml
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: true
