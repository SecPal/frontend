---
name: Dependabot Auto-Merge

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: ${{ github.repository }}-dependabot-auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Enable Auto-Merge
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    timeout-minutes: 10
    steps:
      - name: Check auto-merge eligibility
        id: eligibility
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          echo "PR Title: ${PR_TITLE}"
          echo "PR Labels: ${PR_LABELS}"

          if ! echo "${PR_LABELS}" | grep -q "dependencies"; then
            echo "eligible=false" >> "${GITHUB_OUTPUT}"
            echo "reason=missing dependencies label" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ "${PR_TITLE}" =~ from[[:space:]]+([0-9]+)(\.([0-9]+))?(\.([0-9]+))?[[:space:]]+to[[:space:]]+([0-9]+)(\.([0-9]+))?(\.([0-9]+))? ]]; then
            old_major="${BASH_REMATCH[1]}"
            old_minor="${BASH_REMATCH[3]:-0}"
            old_patch="${BASH_REMATCH[5]:-0}"
            new_major="${BASH_REMATCH[6]}"
            new_minor="${BASH_REMATCH[8]:-0}"
            new_patch="${BASH_REMATCH[10]:-0}"

            echo "Old version: ${old_major}.${old_minor}.${old_patch}"
            echo "New version: ${new_major}.${new_minor}.${new_patch}"

            if [[ "${new_major}" != "${old_major}" ]]; then
              echo "eligible=false" >> "${GITHUB_OUTPUT}"
              echo "reason=major update" >> "${GITHUB_OUTPUT}"
            elif [[ "${new_minor}" != "${old_minor}" ]]; then
              echo "eligible=false" >> "${GITHUB_OUTPUT}"
              echo "reason=minor update" >> "${GITHUB_OUTPUT}"
            elif [[ "${new_patch}" != "${old_patch}" ]]; then
              echo "eligible=true" >> "${GITHUB_OUTPUT}"
              echo "reason=patch update" >> "${GITHUB_OUTPUT}"
            else
              echo "eligible=false" >> "${GITHUB_OUTPUT}"
              echo "reason=version unchanged" >> "${GITHUB_OUTPUT}"
            fi
          else
            echo "eligible=false" >> "${GITHUB_OUTPUT}"
            echo "reason=unparseable version update" >> "${GITHUB_OUTPUT}"
          fi

      - name: Enable auto-merge
        if: steps.eligibility.outputs.eligible == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "${PR_URL}"

      - name: Log skipped auto-merge
        if: steps.eligibility.outputs.eligible != 'true'
        run: |
          echo "Auto-merge skipped: ${{ steps.eligibility.outputs.reason }}"
