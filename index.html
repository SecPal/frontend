<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon-32x32.png"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/logo-dark-32.png"
      media="(prefers-color-scheme: dark)"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/favicon-16x16.png"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/logo-dark-16.png"
      media="(prefers-color-scheme: dark)"
    />
    <link
      rel="icon"
      type="image/x-icon"
      href="/favicon-light.ico"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/x-icon"
      href="/favicon-dark.ico"
      media="(prefers-color-scheme: dark)"
    />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <!--
      `interactive-widget=resizes-content` opts into the modern viewport
      behavior where the layout viewport (and `100dvh`) shrinks when a
      mobile soft-keyboard opens, instead of the default
      `overlays-content` which lets the keyboard sit on top of the page
      and cover content. Required so the centered MFA dialog
      (`position: fixed; top: 50%; -translate-y-1/2`) re-centers above
      the keyboard in landscape mobile instead of staying mid-screen
      and being half-occluded by the keys.
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content, viewport-fit=cover"
    />
    <meta name="theme-color" content="#ffffff" />
    <meta
      name="description"
      content="SecPal is workforce operations software for private security teams, with secure browser access, onboarding, staffing, and field operations workflows."
    />
    <script src="/theme-color.js"></script>
    <title>SecPal</title>
  </head>

  <body class="bg-white text-zinc-950 dark:bg-zinc-950 dark:text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
